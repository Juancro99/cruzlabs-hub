<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f172a">
    <title>Cruzlabs Hub</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="masthead" aria-labelledby="page-title">
        <div>
          <p class="eyebrow">Cruzlabs</p>
          <h1 id="page-title">Hub</h1>
        </div>
        <a class="coolify-link" href="https://coolify.cruzlabs.dev" target="_blank" rel="noreferrer">
          <span class="status-dot" aria-hidden="true"></span>
          Coolify
        </a>
      </header>

      <section class="overview" aria-label="Resumen">
        <article>
          <span class="metric">4</span>
          <span class="label">Entradas</span>
        </article>
        <article>
          <span class="metric">3</span>
          <span class="label">Apps</span>
        </article>
        <article>
          <span class="metric">1</span>
          <span class="label">Panel</span>
        </article>
      </section>

      <section class="apps" aria-label="Apps hosteadas">
        <a class="app-card primary" href="https://inkami.cruzlabs.dev" target="_blank" rel="noreferrer">
          <span class="app-icon gold" aria-hidden="true">IA</span>
          <span>
            <strong>InkAmi</strong>
            <small>Suwayomi premium cloud</small>
          </span>
          <em>inkami.cruzlabs.dev</em>
        </a>

        <a class="app-card" href="https://suwayomi.cruzlabs.dev" target="_blank" rel="noreferrer">
          <span class="app-icon teal" aria-hidden="true">SY</span>
          <span>
            <strong>Suwayomi</strong>
            <small>Manga cloud</small>
          </span>
          <em>suwayomi.cruzlabs.dev</em>
        </a>

        <a class="app-card" href="https://ota.cruzlabs.dev" target="_blank" rel="noreferrer">
          <span class="app-icon red" aria-hidden="true">32</span>
          <span>
            <strong>ESP32 OTA</strong>
            <small>Firmware updates</small>
          </span>
          <em>ota.cruzlabs.dev</em>
        </a>

        <a class="app-card utility" href="https://coolify.cruzlabs.dev" target="_blank" rel="noreferrer">
          <span class="app-icon steel" aria-hidden="true">CF</span>
          <span>
            <strong>Coolify</strong>
            <small>Infra y despliegues</small>
          </span>
          <em>coolify.cruzlabs.dev</em>
        </a>
      </section>
    </main>
  </body>
</html>
